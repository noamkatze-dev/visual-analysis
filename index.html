<!DOCTYPE html>

<style>

<script type="module">
import { FaceLandmarker, FilesetResolver }
  from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs';

const W_ANA = 160, H_ANA = 90;
const DOT_STEP = 16, DOT_THRESH = 0.18;
const ANA_INTERVAL = 600, REVEAL_FRAC = 0.030;
const GAZE_LERP = 0.08;
const CAL_PTS = [
  [0.1,0.1],[0.5,0.1],[0.9,0.1],
  [0.9,0.5],[0.5,0.5],[0.1,0.5],
  [0.1,0.9],[0.5,0.9],[0.9,0.9],
];
const CAL_FILL_RATE = 0.65, CAL_DRAIN_RATE = 0.20, CAL_VAR_THRESH = 0.003;
const HEAT_W = 60, HEAT_H = 34;
const BUF_MAX = 30;

// ── משתנים גלובליים לכיול ──
let rawGX = 0.5, rawGY = 0.5;
let sGX = 0.5, sGY = 0.5;
let curOffX = 0.5, curOffY = 0.5;
const offXBuf = [], offYBuf = [];
let calMap = null;

const state = {
  userName:'', calMap:null,
  rawGX:0.5, rawGY:0.5, sGX:0.5, sGY:0.5, gazeOn:false,
  currentConcept:null, sessionId:null, sessionStart:null, sessionMs:0,
  labelsRevealed:[], analysisLog:[], ws:null, frameBuffer:[],
  pool:[], prevPx:null, gazeHistory:[],
  totalRevealed:0, avgDwellMs:0, switchRate:0,
  lastDotIndex:-1, switchTimestamps:[], horizontalSweep:false, gazeSpeed:0,
};

const byId = id => document.getElementById(id);
const phaseNameEntry=byId('phaseNameEntry'), phaseCal=byId('phaseCal'),
      phaseMenu=byId('phaseMenu'), phaseConcept=byId('phaseConcept'),
      phaseGallery=byId('phaseGallery'), nameInput=byId('nameInput'),
      nameArrow=byId('nameArrow'), calIntroBlock=byId('calIntroBlock'),
      calCanvas=byId('calCanvas'), calDoneMsg=byId('calDoneMsg'),
      btnCalBegin=byId('btnCalBegin'), menuUserLabel=byId('menuUserLabel'),
      menuGalleryBtn=byId('menuGalleryBtn'), conceptVideo=byId('conceptVideo'),
      heatCanvas=byId('heatCanvas'), lineCanvas=byId('lineCanvas'),
      dotCanvas=byId('dotCanvas'), annLayer=byId('annLayer'),
      gazeDot=byId('gazeDot'), conceptBack=byId('conceptBack'),
      conceptNameLabel=byId('conceptNameLabel'), conceptSubLabel=byId('conceptSubLabel'),
      conceptEndBtn=byId('conceptEndBtn'), progressFill=byId('progressFill'),
      conceptCountdown=byId('conceptCountdown'), galleryTitle=byId('galleryTitle'),
      galleryCount=byId('galleryCount'), galleryGrid=byId('galleryGrid'),
      galleryBackBtn=byId('galleryBackBtn'), galleryAllBtn=byId('galleryAllBtn');

const heatCtx=heatCanvas.getContext('2d'), lineCtx=lineCanvas.getContext('2d'),
      dotCtx=dotCanvas.getContext('2d');
const offCanvas=document.createElement('canvas');
offCanvas.width=1280; offCanvas.height=720;
const offCtx=offCanvas.getContext('2d');
const anaCanvas=document.createElement('canvas');
anaCanvas.width=W_ANA; anaCanvas.height=H_ANA;
const anaCtx=anaCanvas.getContext('2d',{willReadFrequently:true});

let activePhaseEl=phaseNameEntry;
function showPhase(el){
  if(activePhaseEl) activePhaseEl.classList.remove('active');
  el.classList.add('active'); activePhaseEl=el;
}

function connectWS(){
  const proto=location.protocol==='https:'?'wss':'ws';
  const ws=new WebSocket(proto+'://'+location.host);
  ws.onopen=()=>{state.ws=ws;};
  ws.onclose=()=>{state.ws=null; setTimeout(connectWS,2000);};
  ws.onerror=()=>ws.close();
  ws.onmessage=ev=>{
    try{
      const msg=JSON.parse(ev.data);
      if(msg.type==='gallery_update'&&phaseGallery.classList.contains('gallery-open'))
        refreshGallery(galleryFilterConcept);
    }catch(e){}
  };
}
connectWS();
function wsSend(obj){if(state.ws&&state.ws.readyState===1)state.ws.send(JSON.stringify(obj));}

function submitName(){
  const v=nameInput.value.trim();
  if(!v){nameInput.classList.remove('shake');void nameInput.offsetWidth;nameInput.classList.add('shake');return;}
  state.userName=v; showPhase(phaseCal);
}
nameArrow.addEventListener('click',submitName);
nameInput.addEventListener('keydown',e=>{if(e.key==='Enter')submitName();});
nameInput.addEventListener('animationend',()=>nameInput.classList.remove('shake'));

// ── חישוב יציבות מתוקן – משתמש ב־offXBuf/offYBuf הגלובליים ──
function stability(){
  const N = Math.min(offXBuf.length, 20);
  if(N < 8) return 0;
  const xs = offXBuf.slice(-N);
  const ys = offYBuf.slice(-N);
  const mx = xs.reduce((a,b)=>a+b,0)/N;
  const my = ys.reduce((a,b)=>a+b,0)/N;
  const vx = xs.reduce((a,b)=>a+(b-mx)**2,0)/N;
  const vy = ys.reduce((a,b)=>a+(b-my)**2,0)/N;
  return Math.max(0, Math.min(1, 1-(vx+vy)/0.003));
}

// ── stability הישנה לשימוש פנימי ב-awaitDot ──
function stabilityLocal(samples){
  if(samples.length<4) return 0;
  const n=samples.length;
  const mx=samples.reduce((s,p)=>s+p[0],0)/n;
  const my=samples.reduce((s,p)=>s+p[1],0)/n;
  const vx=samples.reduce((s,p)=>s+(p[0]-mx)**2,0)/n;
  const vy=samples.reduce((s,p)=>s+(p[1]-my)**2,0)/n;
  return vx+vy;
}

function fitAffine(screenPts,headPts){
  const n=screenPts.length, A=[], bx=[], by=[];
  for(let i=0;i<n;i++){
    A.push([headPts[i][0],headPts[i][1],1]);
    bx.push(screenPts[i][0]); by.push(screenPts[i][1]);
  }
  function lsq(M,b){
    const Mt=M[0].map((_,c)=>M.map(r=>r[c]));
    const MtM=Mt.map(r=>Mt[0].map((_,c)=>r.reduce((s,v,k)=>s+v*M[k][c],0)));
    const Mtb=Mt.map(r=>r.reduce((s,v,k)=>s+v*b[k],0));
    return mv3(inv3(MtM),Mtb);
  }
  return{cx:lsq(A,bx),cy:lsq(A,by)};
}
function inv3(m){
  const[[a,b,c],[d,e,f],[g,h,k]]=m;
  const det=a*(e*k-f*h)-b*(d*k-f*g)+c*(d*h-e*g), s=1/det;
  return[[(e*k-f*h)*s,-(b*k-c*h)*s,(b*f-c*e)*s],
         [-(d*k-f*g)*s,(a*k-c*g)*s,-(a*f-c*d)*s],
         [(d*h-e*g)*s,-(a*h-b*g)*s,(a*e-b*d)*s]];
}
function mv3(m,v){return[
  m[0][0]*v[0]+m[0][1]*v[1]+m[0][2]*v[2],
  m[1][0]*v[0]+m[1][1]*v[1]+m[1][2]*v[2],
  m[2][0]*v[0]+m[2][1]*v[1]+m[2][2]*v[2]
];}

function resizeCal(){calCanvas.width=window.innerWidth;calCanvas.height=window.innerHeight;}

async function awaitDot(ctx,W,H,nx,ny,getLandmarks){
  return new Promise(resolve=>{
    const px=nx*W, py=ny*H;
    let fill=0;
    const recent=[], captured=[];
    function frame(){
      ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,W,H);
      ctx.beginPath(); ctx.arc(px,py,22,0,Math.PI*2);
      ctx.strokeStyle='rgba(0,0,0,0.08)'; ctx.lineWidth=1.5; ctx.stroke();
      if(fill>0){
        ctx.beginPath();
        ctx.arc(px,py,22,-Math.PI/2,-Math.PI/2+Math.PI*2*fill);
        ctx.strokeStyle='#ff1500'; ctx.lineWidth=2; ctx.stroke();
      }
      ctx.beginPath(); ctx.arc(px,py,5,0,Math.PI*2);
      ctx.fillStyle='#ff1500'; ctx.fill();
      const lm=getLandmarks();
      if(lm){
        const p=lm[1];
        recent.push([p.x,p.y]);
        if(recent.length>20) recent.shift();
        const v=stabilityLocal(recent);
        if(v<CAL_VAR_THRESH||recent.length<8){
          fill=Math.min(1,fill+CAL_FILL_RATE);
          captured.push([p.x,p.y]);
        } else {
          fill=Math.max(0,fill-CAL_DRAIN_RATE);
        }
      } else {
        fill=Math.max(0,fill-CAL_DRAIN_RATE);
      }
      if(fill>=1){
        const avg=captured.slice(-12);
        const ax=avg.reduce((s,p)=>s+p[0],0)/avg.length;
        const ay=avg.reduce((s,p)=>s+p[1],0)/avg.length;
        resolve([ax,ay]);
      } else {
        requestAnimationFrame(frame);
      }
    }
    requestAnimationFrame(frame);
  });
}

async function runCalibration(getLandmarks){
  const W=calCanvas.width=window.innerWidth;
  const H=calCanvas.height=window.innerHeight;
  const ctx=calCanvas.getContext('2d');
  ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,W,H);
  const screenPts=[], headPts=[];
  for(const[nx,ny]of CAL_PTS){
    const hp=await awaitDot(ctx,W,H,nx,ny,getLandmarks);
    screenPts.push([nx,ny]); headPts.push(hp);
    ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,W,H);
    await new Promise(r=>setTimeout(r,180));
  }
  state.calMap=fitAffine(screenPts,headPts);
  calMap=state.calMap; // סנכרון עם משתנה הגלובלי
  ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,W,H);
}

// ── head tracking מתוקן עם curOffX/Y ו-offXBuf/offYBuf ──
function startHeadTracking(getLandmarks){
  function loop(){
    const lm=getLandmarks();
    if(lm){
      // חישוב מיקום הראש מנקודות מפתח
      const nose=lm[1], brow=lm[168], chin=lm[152];
      const lChk=lm[234], rChk=lm[454];

      const hxRaw=(nose.x*4+brow.x+chin.x+lChk.x+rChk.x)/8;
      const hyRaw=(nose.y*4+brow.y+chin.y+lChk.y+rChk.y)/8;

      const headX=1-hxRaw;
      const headY=hyRaw;

      // עדכון curOffX/Y וה-buffers
      curOffX=headX;
      curOffY=headY;

      offXBuf.push(headX);
      if(offXBuf.length>BUF_MAX) offXBuf.shift();

      offYBuf.push(headY);
      if(offYBuf.length>BUF_MAX) offYBuf.shift();

      // החלת הכיול
      if(state.calMap){
        const{cx,cy}=state.calMap;
        state.rawGX=Math.max(0,Math.min(1,cx[0]*headX+cx[1]*headY+cx[2]));
        state.rawGY=Math.max(0,Math.min(1,cy[0]*headX+cy[1]*headY+cy[2]));
      } else {
        state.rawGX=headX;
        state.rawGY=headY;
      }
      rawGX=state.rawGX;
      rawGY=state.rawGY;
      state.gazeOn=true;
    } else {
      state.gazeOn=false;
    }
    state.sGX+=(state.rawGX-state.sGX)*GAZE_LERP;
    state.sGY+=(state.rawGY-state.sGY)*GAZE_LERP;
    sGX=state.sGX;
    sGY=state.sGY;
    requestAnimationFrame(loop);
  }
  loop();
}

function enablePointerFallback(){
  document.addEventListener('mousemove',e=>{
    state.rawGX=e.clientX/window.innerWidth;
    state.rawGY=e.clientY/window.innerHeight;
    rawGX=state.rawGX;
    rawGY=state.rawGY;
    // עדכון buffers גם במצב fallback
    curOffX=state.rawGX;
    curOffY=state.rawGY;
    offXBuf.push(curOffX);
    if(offXBuf.length>BUF_MAX) offXBuf.shift();
    offYBuf.push(curOffY);
    if(offYBuf.length>BUF_MAX) offYBuf.shift();
    state.gazeOn=true;
  });
  function loop(){
    state.sGX+=(state.rawGX-state.sGX)*GAZE_LERP;
    state.sGY+=(state.rawGY-state.sGY)*GAZE_LERP;
    sGX=state.sGX;
    sGY=state.sGY;
    requestAnimationFrame(loop);
  }
  loop();
}

let prevEdge=null;
function sobel(video){
  anaCtx.drawImage(video,0,0,W_ANA,H_ANA);
  const id=anaCtx.getImageData(0,0,W_ANA,H_ANA), d=id.data;
  const gray=new Float32Array(W_ANA*H_ANA);
  for(let i=0;i<gray.length;i++)
    gray[i]=(d[i*4]*0.299+d[i*4+1]*0.587+d[i*4+2]*0.114)/255;
  const out=new Float32Array(W_ANA*H_ANA);
  for(let y=1;y<H_ANA-1;y++) for(let x=1;x<W_ANA-1;x++){
    const i=y*W_ANA+x;
    const gx=-gray[i-W_ANA-1]+gray[i-W_ANA+1]-2*gray[i-1]+2*gray[i+1]-gray[i+W_ANA-1]+gray[i+W_ANA+1];
    const gy= gray[i-W_ANA-1]+2*gray[i-W_ANA]+gray[i-W_ANA+1]-gray[i+W_ANA-1]-2*gray[i+W_ANA]-gray[i+W_ANA+1];
    out[i]=Math.sqrt(gx*gx+gy*gy);
  }
  return out;
}
function rStats(arr){
  let sum=0,max=0;
  for(const v of arr){sum+=v;if(v>max)max=v;}
  const mean=sum/arr.length;
  let vari=0;
  for(const v of arr)vari+=(v-mean)**2;
  return{mean,max,std:Math.sqrt(vari/arr.length)};
}
function buildPool(edgeData){
  const W=window.innerWidth,H=window.innerHeight,pool=[];
  if(edgeData){
    const stats=rStats(edgeData),thresh=stats.mean+stats.std*DOT_THRESH;
    for(let ay=DOT_STEP;ay<H_ANA-DOT_STEP;ay+=DOT_STEP)
      for(let ax=DOT_STEP;ax<W_ANA-DOT_STEP;ax+=DOT_STEP)
        if(edgeData[ay*W_ANA+ax]>thresh) pool.push(makeDot(ax/W_ANA,ay/H_ANA,W,H));
  }
  while(pool.length<200) pool.push(makeDot(Math.random()*0.92+0.04,Math.random()*0.92+0.04,W,H));
  return pool;
}
function makeDot(nx,ny,W,H){
  return{nx,ny,px:nx*W,py:ny*H,revealed:false,label:null,labelEl:null,
         dwellMs:0,visitCount:0,lastVisitTs:0,wasNear:false};
}
function sizeWrapper(){
  dotCanvas.width=lineCanvas.width=heatCanvas.width=window.innerWidth;
  dotCanvas.height=lineCanvas.height=heatCanvas.height=window.innerHeight;
}
function makeLabel(dot){
  const s=state;
  if(dot.dwellMs>1200)                               return'ATTENTION LOCKED';
  if(dot.visitCount>=3)                              return'REPEATED GLANCE';
  if(dot.visitCount>=2&&dot.dwellMs<150)            return'IGNORED AGAIN';
  if(s.totalRevealed<5&&s.sessionMs>15000)          return'LOW ENGAGEMENT';
  if(s.avgDwellMs<200&&s.switchRate>3)              return'FOCUS UNSTABLE';
  if(s.totalRevealed>30&&s.avgDwellMs<200)          return'SCAN WITHOUT PROCESSING';
  if(s.gazeSpeed<0.002&&dot.dwellMs<300)            return'VISUAL DRIFT';
  if(dot.visitCount===0&&s.sessionMs>20000)         return'SKIPPED AREA';
  if(s.horizontalSweep)                              return'SEARCH PATTERN DETECTED';
  return'ATTENTION LOCKED';
}
function analyze(video){
  try{const edge=sobel(video);prevEdge=edge;}catch(e){}
}
function applyGaze(pool,dt){
  const W=window.innerWidth,H=window.innerHeight;
  const gx=state.sGX*W,gy=state.sGY*H;
  const revealDist=W*REVEAL_FRAC;
  state.gazeHistory.push([state.sGX,state.sGY]);
  if(state.gazeHistory.length>5) state.gazeHistory.shift();
  if(state.gazeHistory.length>=2){
    const a=state.gazeHistory[0],b=state.gazeHistory[state.gazeHistory.length-1];
    state.gazeSpeed=Math.sqrt((b[0]-a[0])**2+(b[1]-a[1])**2)/state.gazeHistory.length;
  }
  let nearestIdx=-1,nearestDist=Infinity;
  for(let i=0;i<pool.length;i++){
    const d=pool[i],dd=Math.sqrt((d.px-gx)**2+(d.py-gy)**2);
    if(dd<nearestDist){nearestDist=dd;nearestIdx=i;}
  }
  if(nearestIdx!==state.lastDotIndex&&nearestIdx!==-1){
    state.lastDotIndex=nearestIdx;
    const now=performance.now();
    state.switchTimestamps.push(now);
    state.switchTimestamps=state.switchTimestamps.filter(t=>now-t<1000);
    state.switchRate=state.switchTimestamps.length;
  }
  for(let i=0;i<pool.length;i++){
    const dot=pool[i],near=(i===nearestIdx&&nearestDist<revealDist);
    if(near){
      dot.dwellMs+=dt*1000;
      if(!dot.wasNear){dot.visitCount++;dot.lastVisitTs=state.sessionMs;dot.wasNear=true;}
      if(!dot.revealed){
        dot.revealed=true; state.totalRevealed++;
        const rev=pool.filter(d=>d.revealed);
        state.avgDwellMs=rev.reduce((s,d)=>s+d.dwellMs,0)/(rev.length||1);
        const r4=pool.filter(d=>d.revealed&&d.lastVisitTs>0)
                     .sort((a,b)=>a.lastVisitTs-b.lastVisitTs).slice(-4);
        if(r4.length===4){
          const avgY=r4.reduce((s,d)=>s+d.ny,0)/4;
          state.horizontalSweep=r4.every(d=>Math.abs(d.ny-avgY)<0.03)&&
            r4[0].nx<r4[1].nx&&r4[1].nx<r4[2].nx&&r4[2].nx<r4[3].nx;
        }
        const lt=makeLabel(dot); dot.label=lt;
        state.labelsRevealed.push(lt);
        state.analysisLog.push({label:lt,count:state.totalRevealed,ts:state.sessionMs});
        const le=document.createElement('div');
        le.className='dot-label'; le.textContent=lt;
        le.style.left=dot.px+'px'; le.style.top=dot.py+'px';
        annLayer.appendChild(le); dot.labelEl=le;
      }
    } else { dot.wasNear=false; }
  }
  const rev=pool.filter(d=>d.revealed);
  if(rev.length) state.avgDwellMs=rev.reduce((s,d)=>s+d.dwellMs,0)/rev.length;
  return{nearestIdx,nearestDist};
}

let conceptRAF=null,sessionInterval=null,frameInterval=null,anaInterval=null;

function generateSessionId(){
  return'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{
    const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16);});
}

function startConcept(conceptNum){
  state.currentConcept=conceptNum; state.sessionId=generateSessionId();
  state.sessionStart=performance.now(); state.sessionMs=0;
  state.labelsRevealed=[]; state.analysisLog=[]; state.frameBuffer=[];
  state.gazeHistory=[]; state.totalRevealed=0; state.avgDwellMs=0;
  state.switchRate=0; state.lastDotIndex=-1; state.switchTimestamps=[];
  state.horizontalSweep=false; state.gazeSpeed=0; prevEdge=null;
  c1State={}; c2Lines=[]; c2PrevIdx=-1; c2PrevTime=performance.now();
  c3Path=[]; c4Trail=[]; c5List=[]; c6Arcs=[]; c6Count=0; c6VisitedOnce={};
  c7Heat=new Float32Array(HEAT_W*HEAT_H);
  sizeWrapper();
  heatCtx.clearRect(0,0,heatCanvas.width,heatCanvas.height);
  lineCtx.clearRect(0,0,lineCanvas.width,lineCanvas.height);
  dotCtx.clearRect(0,0,dotCanvas.width,dotCanvas.height);
  annLayer.innerHTML='';
  let edgeData;
  try{edgeData=sobel(conceptVideo);}catch(e){edgeData=null;}
  state.pool=buildPool(edgeData);
  conceptNameLabel.textContent=String(conceptNum).padStart(2,'0')+'  '+CONCEPT_NAMES[conceptNum];
  conceptSubLabel.textContent=conceptNum===3?'PATH · 0 NODES':conceptNum===6?'REVISITS · 0':'';
  progressFill.style.width='0%'; conceptCountdown.textContent='01:30';
  showPhase(phaseConcept);
  document.body.style.cursor='none'; gazeDot.style.display='block';
  let elapsed=0;
  sessionInterval=setInterval(()=>{
    elapsed++;
    progressFill.style.width=((elapsed/90)*100)+'%';
    const rem=Math.max(0,90-elapsed);
    conceptCountdown.textContent=String(Math.floor(rem/60)).padStart(2,'0')+':'+String(rem%60).padStart(2,'0');
    if(elapsed>=90) endSessionToGallery();
  },1000);
  frameInterval=setInterval(captureFrame,3000);
  anaInterval=setInterval(()=>analyze(conceptVideo),ANA_INTERVAL);
  let lastT=performance.now();
  function loop(now){
    const dt=Math.min((now-lastT)/1000,0.1); lastT=now;
    state.sessionMs=now-state.sessionStart;
    const W=dotCanvas.width,H=dotCanvas.height;
    const gx=state.sGX*W,gy=state.sGY*H;
    gazeDot.style.left=gx+'px'; gazeDot.style.top=gy+'px';
    const{nearestIdx,nearestDist}=applyGaze(state.pool,dt);
    dotCtx.clearRect(0,0,W,H);
    switch(conceptNum){
      case 1:renderFixation(dt,W,H,gx,gy,nearestIdx,nearestDist,now);break;
      case 2:renderSaccade(dt,W,H,gx,gy,nearestIdx,nearestDist);break;
      case 3:renderScanPath(dt,W,H,gx,gy);break;
      case 4:renderGazePoint(dt,W,H,gx,gy,now);break;
      case 5:renderFirstFixation(dt,W,H,gx,gy,nearestIdx,nearestDist);break;
      case 6:renderRevisit(dt,W,H,gx,gy,nearestIdx,nearestDist,now);break;
      case 7:renderHeatmap(dt,W,H,gx,gy);break;
    }
    conceptRAF=requestAnimationFrame(loop);
  }
  conceptRAF=requestAnimationFrame(t=>{lastT=t;loop(t);});
}

function cleanupSession(){
  clearInterval(sessionInterval); clearInterval(frameInterval);
  clearInterval(anaInterval); cancelAnimationFrame(conceptRAF);
  sessionInterval=frameInterval=anaInterval=conceptRAF=null;

function renderFixation(dt,W,H,gx,gy,nearestIdx,nearestDist,now){
  const revealDist=W*REVEAL_FRAC;
  for(let i=0;i<state.pool.length;i++){
    const dot=state.pool[i]; if(!dot.revealed) continue;
    const near=(i===nearestIdx&&nearestDist<revealDist&&dot.dwellMs>800);
    if(!c1State[i]) c1State[i]={r:2,growing:false,pulseStart:0};
    const s=c1State[i];
    if(near){
      if(!s.growing){s.growing=true;s.pulseStart=now;}
      s.r=Math.min(10,s.r+(10-s.r)*0.12);
      const t=((now-s.pulseStart)%1200)/1200;
      const scale=1+0.15*Math.sin(t*Math.PI*2);
      dotCtx.save(); dotCtx.translate(dot.px,dot.py); dotCtx.scale(scale,scale);
      dotCtx.beginPath(); dotCtx.arc(0,0,s.r,0,Math.PI*2);
      dotCtx.fillStyle='#ffffff'; dotCtx.fill(); dotCtx.restore();
    } else {
      s.growing=false; s.r=Math.max(2,s.r+(2-s.r)*0.1);
      dotCtx.beginPath(); dotCtx.arc(dot.px,dot.py,s.r,0,Math.PI*2);
      dotCtx.fillStyle=s.r>2.5?'#ffffff':'rgba(255,21,0,0.55)'; dotCtx.fill();
    }
  }
}

function renderSaccade(dt,W,H,gx,gy,nearestIdx,nearestDist){
  const revealDist=W*REVEAL_FRAC;
  for(const dot of state.pool){
    if(!dot.revealed) continue;
    dotCtx.beginPath(); dotCtx.arc(dot.px,dot.py,2,0,Math.PI*2);
    dotCtx.fillStyle='rgba(255,21,0,0.45)'; dotCtx.fill();
  }
  if(nearestIdx>=0&&nearestDist<revealDist&&nearestIdx!==c2PrevIdx&&c2PrevIdx>=0){
    const nowMs=performance.now(), ms=nowMs-c2PrevTime;
    const prev=state.pool[c2PrevIdx], curr=state.pool[nearestIdx];
    const dx=(curr.px-prev.px)/W, dy=(curr.py-prev.py)/H;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>0.08&&ms<300) c2Lines.push({x1:prev.px,y1:prev.py,x2:curr.px,y2:curr.py,alpha:0.6});
    c2PrevTime=nowMs;
  }
  if(nearestIdx>=0&&nearestDist<revealDist) c2PrevIdx=nearestIdx;
  lineCtx.clearRect(0,0,lineCanvas.width,lineCanvas.height);
  c2Lines=c2Lines.filter(ln=>{
    ln.alpha-=dt*0.75; if(ln.alpha<=0) return false;
    lineCtx.beginPath(); lineCtx.moveTo(ln.x1,ln.y1); lineCtx.lineTo(ln.x2,ln.y2);
    lineCtx.strokeStyle=`rgba(255,21,0,${ln.alpha.toFixed(3)})`; lineCtx.lineWidth=1; lineCtx.stroke();
    return true;
  });
}

function renderScanPath(dt,W,H,gx,gy){
  for(const dot of state.pool){
    if(!dot.revealed) continue;
    dotCtx.beginPath(); dotCtx.arc(dot.px,dot.py,2,0,Math.PI*2);
    dotCtx.fillStyle='rgba(255,21,0,0.4)'; dotCtx.fill();
  }
  if(state.gazeOn){
    const last=c3Path[c3Path.length-1];
    if(!last||Math.hypot(last.x-gx,last.y-gy)>3){
      c3Path.push({x:gx,y:gy}); if(c3Path.length>40) c3Path.shift();
    }
  }
  lineCtx.clearRect(0,0,lineCanvas.width,lineCanvas.height);
  if(c3Path.length>=2){
    for(let i=1;i<c3Path.length;i++){
      const frac=i/(c3Path.length-1), alpha=0.06+0.64*frac;
      lineCtx.beginPath(); lineCtx.moveTo(c3Path[i-1].x,c3Path[i-1].y);
      lineCtx.lineTo(c3Path[i].x,c3Path[i].y);
      lineCtx.strokeStyle=`rgba(255,21,0,${alpha.toFixed(3)})`; lineCtx.lineWidth=1; lineCtx.stroke();
    }
  }
  conceptSubLabel.textContent=`PATH · ${c3Path.length} NODES`;
}

function renderGazePoint(dt,W,H,gx,gy,now){
  lineCtx.clearRect(0,0,lineCanvas.width,lineCanvas.height);
  c4Trail.push({x:gx,y:gy}); if(c4Trail.length>12) c4Trail.shift();
  for(let i=0;i<c4Trail.length;i++){
    const frac=i/(c4Trail.length-1);
    dotCtx.beginPath(); dotCtx.arc(c4Trail[i].x,c4Trail[i].y,1+7*frac,0,Math.PI*2);
    dotCtx.fillStyle=`rgba(255,255,255,${(0.05+0.45*frac).toFixed(3)})`; dotCtx.fill();
  }
  [{offset:0},{offset:500},{offset:1000}].forEach(rd=>{
    const t=((now-rd.offset)%1500)/1500, r=8+32*t, alpha=0.4*(1-t);
    if(alpha<=0) return;
    dotCtx.beginPath(); dotCtx.arc(gx,gy,r,0,Math.PI*2);
    dotCtx.strokeStyle=`rgba(255,255,255,${alpha.toFixed(3)})`; dotCtx.lineWidth=1; dotCtx.stroke();
  });
  dotCtx.beginPath(); dotCtx.arc(gx,gy,8,0,Math.PI*2);
  dotCtx.fillStyle='#ffffff'; dotCtx.fill();
}

function renderFirstFixation(dt,W,H,gx,gy,nearestIdx,nearestDist){
  const revealDist=W*REVEAL_FRAC;
  lineCtx.clearRect(0,0,lineCanvas.width,lineCanvas.height);
  if(nearestIdx>=0&&nearestDist<revealDist){
    const dot=state.pool[nearestIdx];
    if(!c5List.find(f=>f.idx===nearestIdx)&&dot.dwellMs>600){
      const order=c5List.length, ts=Math.floor(state.sessionMs);
      c5List.push({idx:nearestIdx,order,ts});
      const le=document.createElement('div'); le.className='dot-label';
      le.textContent=order===0?`FIRST FIXATION / T+${ts}ms`:`FIXATION_${order+1} / T+${ts}ms`;
      le.style.left=dot.px+'px'; le.style.top=dot.py+'px'; annLayer.appendChild(le);
    }
  }
  for(const fix of c5List){
    const dot=state.pool[fix.idx];
    dotCtx.beginPath(); dotCtx.arc(dot.px,dot.py,fix.order===0?8:4,0,Math.PI*2);
    dotCtx.fillStyle=fix.order===0?'#ffffff':'#ff1500'; dotCtx.fill();
  }
}

function renderRevisit(dt,W,H,gx,gy,nearestIdx,nearestDist,now){
  for(let i=0;i<state.pool.length;i++){
    const dot=state.pool[i]; if(!dot.revealed) continue;
    if(dot.visitCount>=2&&!c6VisitedOnce[i]){
      c6VisitedOnce[i]=true; c6Count++;
      conceptSubLabel.textContent=`REVISITS · ${c6Count}`;
      const prev=state.pool.filter((d,j)=>d.revealed&&j!==i).slice(-1)[0];
      c6Arcs.push({x1:prev?prev.px:dot.px-120,y1:prev?prev.py:dot.py,
                   x2:dot.px,y2:dot.py,progress:0,born:now});
    }
    if(dot.visitCount>=3){
      const scale=1+0.15*Math.sin(now*0.001*Math.PI*2*0.8);
      dotCtx.save(); dotCtx.translate(dot.px,dot.py); dotCtx.scale(scale,scale);
      dotCtx.beginPath(); dotCtx.arc(0,0,4,0,Math.PI*2);
      dotCtx.fillStyle='#ff1500'; dotCtx.fill(); dotCtx.restore();
    } else {
      dotCtx.beginPath(); dotCtx.arc(dot.px,dot.py,2,0,Math.PI*2);
      dotCtx.fillStyle='rgba(255,21,0,0.45)'; dotCtx.fill();
    }
  }
  lineCtx.clearRect(0,0,lineCanvas.width,lineCanvas.height);
  c6Arcs=c6Arcs.filter(arc=>{
    arc.progress=Math.min(1,arc.progress+dt/0.4);
    const cpX=(arc.x1+arc.x2)/2, cpY=Math.min(arc.y1,arc.y2)-60;
    const steps=Math.ceil(arc.progress*40);
    lineCtx.beginPath();
    for(let s=0;s<=steps;s++){
      const t=s/40;
      const bx=(1-t)*(1-t)*arc.x1+2*(1-t)*t*cpX+t*t*arc.x2;
      const by=(1-t)*(1-t)*arc.y1+2*(1-t)*t*cpY+t*t*arc.y2;
      if(s===0) lineCtx.moveTo(bx,by); else lineCtx.lineTo(bx,by);
    }
    lineCtx.strokeStyle='rgba(255,21,0,0.5)'; lineCtx.lineWidth=1; lineCtx.stroke();
    return now-arc.born<4000;
  });
}

function renderHeatmap(dt,W,H,gx,gy){
  for(let i=0;i<c7Heat.length;i++) c7Heat[i]*=0.992;
  const hgx=Math.round(state.sGX*HEAT_W), hgy=Math.round(state.sGY*HEAT_H), R=4;
  for(let dy=-R;dy<=R;dy++) for(let dx=-R;dx<=R;dx++){
    const hx=hgx+dx, hy=hgy+dy;
    if(hx<0||hx>=HEAT_W||hy<0||hy>=HEAT_H) continue;
    const w=Math.exp(-(dx*dx+dy*dy)/(R*R*0.5));
    const ii=hy*HEAT_W+hx;
    c7Heat[ii]=Math.min(1,c7Heat[ii]+w*0.06);
  }
  const cw=W/HEAT_W, ch=H/HEAT_H;
  heatCtx.clearRect(0,0,W,H);
  for(let hy=0;hy<HEAT_H;hy++) for(let hx=0;hx<HEAT_W;hx++){
    const v=c7Heat[hy*HEAT_W+hx]; if(v<0.01) continue;
    let color;
    if(v<0.15) color=`rgba(255,21,0,${(0.06*v/0.15).toFixed(3)})`;
    else if(v<0.5) color=`rgba(255,60,0,${(0.06+0.16*(v-0.15)/0.35).toFixed(3)})`;
    else color=`rgba(255,21,0,${(0.22+0.28*(v-0.5)/0.5).toFixed(3)})`;
    heatCtx.fillStyle=color; heatCtx.fillRect(hx*cw,hy*ch,cw+1,ch+1);
  }
  for(const dot of state.pool){
    if(!dot.revealed) continue;
    dotCtx.beginPath(); dotCtx.arc(dot.px,dot.py,2,0,Math.PI*2);
    dotCtx.fillStyle='rgba(255,21,0,0.4)'; dotCtx.fill();
  }
}

let galleryFilterConcept=null;
async function openGallery(conceptNum){
  galleryFilterConcept=conceptNum;
  galleryTitle.textContent=conceptNum
    ?`CONCEPT ${String(conceptNum).padStart(2,'0')} — ${CONCEPT_NAMES[conceptNum]}`
    :'ALL SESSIONS';
  await refreshGallery(conceptNum);
  if(activePhaseEl===phaseConcept){phaseConcept.classList.remove('active');activePhaseEl=null;}
  phaseGallery.classList.add('gallery-open');
}
async function refreshGallery(conceptNum){
  const url=conceptNum?`/api/sessions?concept=${conceptNum}`:'/api/sessions';
  let sessions=[];
  try{const res=await fetch(url);sessions=await res.json();}catch(e){}
  galleryCount.textContent=`${sessions.length} SESSION${sessions.length!==1?'S':''}`;
  galleryGrid.innerHTML='';
  if(!sessions.length){
    const empty=document.createElement('div');
    empty.id='galleryEmpty'; empty.textContent='NO SESSIONS RECORDED YET';
    galleryGrid.appendChild(empty); return;
  }
  for(const s of sessions){
    const card=document.createElement('div'); card.className='galleryCard';
    const vid=document.createElement('video');
    vid.muted=true; vid.loop=true; vid.playsInline=true;
    if(s.video_path) vid.src=s.video_path;
    vid.addEventListener('mouseenter',()=>vid.play().catch(()=>{}));
    vid.addEventListener('mouseleave',()=>{vid.pause();vid.currentTime=0;});
    const info=document.createElement('div'); info.className='galleryCardInfo';
    const nameEl=document.createElement('div'); nameEl.className='galleryCardName';
    nameEl.textContent=s.user_name||'—';
    const durEl=document.createElement('div'); durEl.className='galleryCardDuration';
    const d=s.duration_seconds||0;
    durEl.textContent=String(Math.floor(d/60)).padStart(2,'0')+':'+String(d%60).padStart(2,'0');
    const lblArr=Array.isArray(s.labels_revealed)?s.labels_revealed:[];
    const lc={};
    for(const l of lblArr) lc[l]=(lc[l]||0)+1;
    const lblEl=document.createElement('div'); lblEl.className='galleryCardLabels';
    lblEl.textContent=Object.entries(lc).map(([k,v])=>`${k} ×${v}`).join('\n');
    info.appendChild(nameEl); info.appendChild(durEl); info.appendChild(lblEl);
    card.appendChild(vid); card.appendChild(info); galleryGrid.appendChild(card);
  }
}
galleryBackBtn.addEventListener('click',()=>{
  phaseGallery.classList.remove('gallery-open');
  setTimeout(()=>{showPhase(phaseMenu);menuUserLabel.textContent=state.userName;},400);
});
galleryAllBtn.addEventListener('click',()=>openGallery(null));

window.addEventListener('resize',()=>{
  if(state.currentConcept){
    sizeWrapper();
    const W=window.innerWidth,H=window.innerHeight;
    for(const dot of state.pool){
      dot.px=dot.nx*W; dot.py=dot.ny*H;
      if(dot.labelEl){dot.labelEl.style.left=dot.px+'px';dot.labelEl.style.top=dot.py+'px';}
    }
  }
});
</script>
