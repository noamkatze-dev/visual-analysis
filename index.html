<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VISUAL ANALYSIS</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@100;300;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 100%;
  height: 100%;
  background: #ffffff;
  font-family: 'Heebo', sans-serif;
  color: #000000;
  overflow: hidden;
}

#app {
  position: relative;
  width: 100vw;
  height: 100vh;
}

.phase {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #ffffff;
  opacity: 0;
  pointer-events: none;
  transition: opacity 300ms ease;
}
.phase.active {
  opacity: 1;
  pointer-events: all;
}

/* ── PHASE 0 — NAME ENTRY ── */
#phaseNameEntry .block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
  width: 320px;
}
#phaseNameEntry .t-title {
  font-weight: 100;
  font-size: 28px;
  letter-spacing: 0.35em;
  color: #000;
  text-align: center;
}
#phaseNameEntry .t-sep {
  width: 300px;
  height: 1px;
  background: rgba(0,0,0,0.08);
}
#phaseNameEntry .t-label {
  font-weight: 300;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(0,0,0,0.35);
  text-align: center;
}
#phaseNameEntry .input-row {
  display: flex;
  align-items: center;
  gap: 14px;
}
#nameInput {
  border: none;
  outline: none;
  background: transparent;
  border-bottom: 1px solid rgba(0,0,0,0.2);
  font-family: 'Heebo', sans-serif;
  font-weight: 300;
  font-size: 18px;
  color: #000;
  width: 240px;
  text-align: center;
  caret-color: #ff1500;
  padding: 4px 0;
  transition: border-bottom-color 300ms ease;
}
#nameInput:focus {
  border-bottom-color: rgba(0,0,0,0.6);
}
#nameArrow {
  border: none;
  background: none;
  color: rgba(0,0,0,0.3);
  font-size: 20px;
  cursor: pointer;
  font-family: 'Heebo', sans-serif;
  transition: color 300ms ease;
  padding: 0;
  line-height: 1;
}
#nameArrow:hover {
  color: #000;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%       { transform: translateX(-7px); }
  40%       { transform: translateX(7px); }
  60%       { transform: translateX(-5px); }
  80%       { transform: translateX(5px); }
}
.shake {
  animation: shake 0.38s ease;
}

/* ── PHASE 1 — CALIBRATION ── */
#phaseCal {
  background: #ffffff;
  flex-direction: column;
}
#calIntroBlock {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
  text-align: center;
}
#calIntroBlock .cal-title {
  font-weight: 100;
  font-size: 20px;
  letter-spacing: 0.3em;
  color: #000;
}
#calIntroBlock .cal-sep {
  width: 280px;
  height: 1px;
  background: rgba(0,0,0,0.08);
}
#calIntroBlock .cal-body {
  font-weight: 300;
  font-size: 13px;
  line-height: 2;
  color: rgba(0,0,0,0.45);
  letter-spacing: 0.05em;
}
#btnCalBegin {
  background: transparent;
  border: 1px solid rgba(0,0,0,0.3);
  color: #000;
  font-family: 'Heebo', sans-serif;
  font-weight: 300;
  font-size: 11px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  padding: 12px 32px;
  cursor: pointer;
  transition: border-color 300ms ease, color 300ms ease;
}
#btnCalBegin:hover {
  border-color: #000;
  color: #000;
}
#calDoneMsg {
  font-weight: 100;
  font-size: 18px;
  letter-spacing: 0.4em;
  color: #000;
  text-transform: uppercase;
  display: none;
}

#calCanvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: none;
  z-index: 999;
}

/* ── PHASE 2 — MAIN MENU ── */
#phaseMenu {
  background: #ffffff;
}
#menuUserLabel {
  position: fixed;
  top: 22px;
  right: 24px;
  font-weight: 300;
  font-size: 10px;
  color: rgba(0,0,0,0.2);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  pointer-events: none;
}
#menuGalleryBtn {
  position: fixed;
  bottom: 24px;
  right: 24px;
  font-weight: 300;
  font-size: 10px;
  color: rgba(0,0,0,0.2);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer;
  background: none;
  border: none;
  font-family: 'Heebo', sans-serif;
  transition: color 300ms ease;
  z-index: 10;
}
#menuGalleryBtn:hover {
  color: #000;
}
#menuBlock {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  width: 320px;
}
#menuBlock .m-title {
  font-weight: 100;
  font-size: 28px;
  letter-spacing: 0.35em;
  color: #000;
  margin-bottom: 24px;
}
#menuBlock .m-sep {
  width: 100%;
  height: 1px;
  background: rgba(0,0,0,0.08);
}
#menuBlock .m-sep-top { margin-bottom: 4px; }
#menuBlock .m-sep-bot { margin-top: 4px; }

.conceptRow {
  display: flex;
  align-items: center;
  height: 52px;
  width: 100%;
  cursor: default;
  position: relative;
  padding-left: 20px;
}
.conceptRow .bullet {
  position: absolute;
  left: 0;
  font-size: 14px;
  color: #ff1500;
  opacity: 0;
  transition: opacity 300ms ease;
  line-height: 1;
}
.conceptRow:hover .bullet { opacity: 1; }
.conceptRow .num {
  font-weight: 300;
  font-size: 14px;
  color: rgba(0,0,0,0.25);
  margin-right: 16px;
  min-width: 24px;
}
.conceptRow .cname {
  font-weight: 300;
  font-size: 14px;
  color: #000;
}

/* ── PHASE 3 — CONCEPT VIEW ── */
#phaseConcept {
  background: #000;
  padding: 0;
}
#conceptVideo {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
#heatCanvas,
#lineCanvas,
#dotCanvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
#heatCanvas { z-index: 2; }
#lineCanvas  { z-index: 3; }
#dotCanvas   { z-index: 4; }
#annLayer {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
  z-index: 5;
}
#gazeDot {
  position: absolute;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 1.5px solid #ff1500;
  pointer-events: none;
  transform: translate(-50%, -50%);
  display: none;
  z-index: 90;
}
#conceptBack {
  position: fixed;
  top: 20px;
  left: 22px;
  font-weight: 300;
  font-size: 10px;
  letter-spacing: 0.2em;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  cursor: pointer;
  background: none;
  border: none;
  font-family: 'Heebo', sans-serif;
  transition: color 300ms ease;
  z-index: 200;
}
#conceptBack:hover { color: #ffffff; }
#conceptNameLabel {
  position: fixed;
  top: 20px;
  right: 22px;
  font-weight: 300;
  font-size: 10px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  z-index: 200;
  text-align: right;
  pointer-events: none;
}
#conceptSubLabel {
  position: fixed;
  top: 34px;
  right: 22px;
  font-weight: 100;
  font-size: 10px;
  color: rgba(255,255,255,0.2);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  z-index: 200;
  pointer-events: none;
}
#conceptEndBtn {
  position: fixed;
  bottom: 34px;
  right: 22px;
  font-weight: 300;
  font-size: 10px;
  letter-spacing: 0.2em;
  color: rgba(255,255,255,0.3);
  text-transform: uppercase;
  cursor: pointer;
  background: none;
  border: none;
  font-family: 'Heebo', sans-serif;
  transition: color 300ms ease;
  z-index: 200;
}
#conceptEndBtn:hover { color: #ffffff; }
#progressWrap {
  position: fixed;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%);
  width: 220px;
  z-index: 200;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
#progressTrack {
  width: 100%;
  height: 1px;
  background: rgba(255,255,255,0.1);
  position: relative;
}
#progressFill {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  background: #ff1500;
  width: 0%;
  transition: width 1s linear;
}
#conceptCountdown {
  font-weight: 100;
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.15em;
}
.dot-label {
  position: absolute;
  font-weight: 300;
  font-size: 9.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #ff1500;
  text-shadow: 0 0 8px rgba(255,255,255,0.9);
  pointer-events: none;
  white-space: nowrap;
  transform: translate(-50%, -160%);
}

/* ── PHASE 4 — GALLERY ── */
#phaseGallery {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  background: #ffffff;
  overflow-y: auto;
  align-items: stretch;
  justify-content: flex-start;
  transform: translateY(100%);
  opacity: 0;
  pointer-events: none;
  transition: transform 400ms ease, opacity 300ms ease;
  z-index: 50;
}
#phaseGallery.gallery-open {
  transform: translateY(0);
  opacity: 1;
  pointer-events: all;
}
#galleryHeader {
  padding: 44px 44px 22px;
  border-bottom: 1px solid rgba(0,0,0,0.08);
  flex-shrink: 0;
}
#galleryTitle {
  font-weight: 100;
  font-size: 22px;
  letter-spacing: 0.35em;
  color: #000;
  text-transform: uppercase;
  margin-bottom: 8px;
}
#galleryCount {
  font-weight: 300;
  font-size: 11px;
  color: rgba(0,0,0,0.3);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
#galleryGrid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: #e0e0e0;
  min-height: 0;
}
.galleryCard {
  background: #ffffff;
  display: flex;
  flex-direction: column;
  cursor: pointer;
  transition: background 300ms ease;
}
.galleryCard:hover { background: #fafafa; }
.galleryCard video {
  width: 100%;
  aspect-ratio: 16 / 9;
  object-fit: cover;
  display: block;
}
.galleryCardInfo {
  padding: 12px 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.galleryCardName {
  font-weight: 300;
  font-size: 11px;
  color: rgba(0,0,0,0.5);
  letter-spacing: 0.08em;
}
.galleryCardDuration {
  font-weight: 100;
  font-size: 10px;
  color: rgba(0,0,0,0.2);
  letter-spacing: 0.1em;
}
.galleryCardLabels {
  font-weight: 300;
  font-size: 10px;
  color: #ff1500;
  letter-spacing: 0.06em;
  margin-top: 4px;
  line-height: 1.8;
  white-space: pre-line;
}
#galleryEmpty {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 80px 0;
  font-weight: 100;
  font-size: 14px;
  letter-spacing: 0.3em;
  color: rgba(0,0,0,0.15);
  text-transform: uppercase;
}
#galleryBottom {
  padding: 18px 44px;
  border-top: 1px solid rgba(0,0,0,0.08);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.galleryNavBtn {
  font-weight: 300;
  font-size: 10px;
  letter-spacing: 0.2em;
  color: rgba(0,0,0,0.25);
  text-transform: uppercase;
  cursor: pointer;
  background: none;
  border: none;
  font-family: 'Heebo', sans-serif;
  transition: color 300ms ease;
}
.galleryNavBtn:hover { color: #000; }
</style>
</head>
<body>
<div id="app">

  <!-- PHASE 0: NAME ENTRY -->
  <div id="phaseNameEntry" class="phase active">
    <div class="block">
      <div class="t-title">VISUAL ANALYSIS</div>
      <div class="t-sep"></div>
      <div class="t-label">enter your name</div>
      <div class="input-row">
        <input id="nameInput" type="text" autocomplete="off" spellcheck="false"/>
        <button id="nameArrow" aria-label="continue">→</button>
      </div>
    </div>
  </div>

  <!-- PHASE 1: CALIBRATION -->
  <div id="phaseCal" class="phase">
    <div id="calIntroBlock">
      <div class="cal-title">HEAD TRACKING CALIBRATION</div>
      <div class="cal-sep"></div>
      <div class="cal-body">
        this calibration runs once<br/>
        for the entire session<br/><br/>
        point your head at each dot<br/>
        and hold still until the ring fills
      </div>
      <button id="btnCalBegin">BEGIN CALIBRATION</button>
    </div>
    <div id="calDoneMsg">SYNCHRONIZED</div>
  </div>

  <!-- PHASE 2: MAIN MENU -->
  <div id="phaseMenu" class="phase">
    <div id="menuUserLabel"></div>
    <div id="menuBlock">
      <div class="m-title">VISUAL ANALYSIS</div>
      <div class="m-sep m-sep-top"></div>
      <div class="conceptRow" data-c="1"><span class="bullet">▸</span><span class="num">01</span><span class="cname">FIXATION</span></div>
      <div class="conceptRow" data-c="2"><span class="bullet">▸</span><span class="num">02</span><span class="cname">SACCADE</span></div>
      <div class="conceptRow" data-c="3"><span class="bullet">▸</span><span class="num">03</span><span class="cname">SCAN PATH</span></div>
      <div class="conceptRow" data-c="4"><span class="bullet">▸</span><span class="num">04</span><span class="cname">GAZE POINT</span></div>
      <div class="conceptRow" data-c="5"><span class="bullet">▸</span><span class="num">05</span><span class="cname">FIRST FIXATION</span></div>
      <div class="conceptRow" data-c="6"><span class="bullet">▸</span><span class="num">06</span><span class="cname">REVISIT</span></div>
      <div class="conceptRow" data-c="7"><span class="bullet">▸</span><span class="num">07</span><span class="cname">HEATMAP</span></div>
      <div class="m-sep m-sep-bot"></div>
    </div>
    <button id="menuGalleryBtn">VIEW GALLERY →</button>
  </div>

  <!-- PHASE 3: CONCEPT VIEW -->
  <div id="phaseConcept" class="phase">
    <video id="conceptVideo" src="statue.mp4" autoplay loop muted playsinline></video>
    <canvas id="heatCanvas"></canvas>
    <canvas id="lineCanvas"></canvas>
    <canvas id="dotCanvas"></canvas>
    <div id="annLayer"></div>
    <div id="gazeDot"></div>
    <button id="conceptBack">← BACK</button>
    <div id="conceptNameLabel"></div>
    <div id="conceptSubLabel"></div>
    <button id="conceptEndBtn">END SESSION →</button>
    <div id="progressWrap">
      <div id="progressTrack">
        <div id="progressFill"></div>
      </div>
      <div id="conceptCountdown">01:30</div>
    </div>
  </div>

  <!-- PHASE 4: GALLERY -->
  <div id="phaseGallery">
    <div id="galleryHeader">
      <div id="galleryTitle"></div>
      <div id="galleryCount"></div>
    </div>
    <div id="galleryGrid"></div>
    <div id="galleryBottom">
      <button class="galleryNavBtn" id="galleryBackBtn">← BACK TO MENU</button>
      <button class="galleryNavBtn" id="galleryAllBtn">ALL CONCEPTS →</button>
    </div>
  </div>

  <!-- calCanvas at top level of #app, outside every opacity-animated ancestor -->
  <canvas id="calCanvas"></canvas>

</div>
<script type="module">
import { FaceLandmarker, FilesetResolver }
  from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs';

// ══════════════════════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════════════════════
const W_ANA           = 160;
const H_ANA           = 90;
const N_ANN           = 6;
const DOT_STEP        = 16;
const DOT_THRESH      = 0.18;
const ANA_INTERVAL    = 600;
const REVEAL_FRAC     = 0.030;
const MAX_BLUR        = 8;
const GAZE_LERP       = 0.08;
const BLUR_GROW_RATE  = 0.04;
const BLUR_CLEAR_RATE = 0.06;
const CAL_PTS = [
  [0.1, 0.1], [0.5, 0.1], [0.9, 0.1],
  [0.1, 0.5], [0.5, 0.5], [0.9, 0.5],
  [0.1, 0.9], [0.5, 0.9], [0.9, 0.9],
];
const CAL_FILL_RATE  = 0.65;
const CAL_DRAIN_RATE = 0.20;
const CAL_VAR_THRESH = 0.003;

// ══════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════
const state = {
  userName: '',
  calMap: null,
  rawGX: 0.5, rawGY: 0.5,
  sGX: 0.5,   sGY: 0.5,
  gazeOn: false,
  currentConcept: null,
  sessionId: null,
  sessionStart: null,
  sessionMs: 0,
  labelsRevealed: [],
  analysisLog: [],
  ws: null,
  frameBuffer: [],
  pool: [],
  prevPx: null,
  gazeHistory: [],
  totalRevealed: 0,
  avgDwellMs: 0,
  switchRate: 0,
  lastDotIndex: -1,
  switchTimestamps: [],
  horizontalSweep: false,
  gazeSpeed: 0,
};

// ══════════════════════════════════════════════════════════════════
// DOM REFS
// ══════════════════════════════════════════════════════════════════
const byId = id => document.getElementById(id);

const phaseNameEntry   = byId('phaseNameEntry');
const phaseCal         = byId('phaseCal');
const phaseMenu        = byId('phaseMenu');
const phaseConcept     = byId('phaseConcept');
const phaseGallery     = byId('phaseGallery');
const nameInput        = byId('nameInput');
const nameArrow        = byId('nameArrow');
const calIntroBlock    = byId('calIntroBlock');
const calCanvas        = byId('calCanvas');
const calDoneMsg       = byId('calDoneMsg');
const btnCalBegin      = byId('btnCalBegin');
const menuUserLabel    = byId('menuUserLabel');
const menuGalleryBtn   = byId('menuGalleryBtn');
const conceptVideo     = byId('conceptVideo');
const heatCanvas       = byId('heatCanvas');
const lineCanvas       = byId('lineCanvas');
const dotCanvas        = byId('dotCanvas');
const annLayer         = byId('annLayer');
const gazeDot          = byId('gazeDot');
const conceptBack      = byId('conceptBack');
const conceptNameLabel = byId('conceptNameLabel');
const conceptSubLabel  = byId('conceptSubLabel');
const conceptEndBtn    = byId('conceptEndBtn');
const progressFill     = byId('progressFill');
const conceptCountdown = byId('conceptCountdown');
const galleryTitle     = byId('galleryTitle');
const galleryCount     = byId('galleryCount');
const galleryGrid      = byId('galleryGrid');
const galleryBackBtn   = byId('galleryBackBtn');
const galleryAllBtn    = byId('galleryAllBtn');

const heatCtx = heatCanvas.getContext('2d');
const lineCtx = lineCanvas.getContext('2d');
const dotCtx  = dotCanvas.getContext('2d');

const offCanvas = document.createElement('canvas');
offCanvas.width  = 1280;
offCanvas.height = 720;
const offCtx = offCanvas.getContext('2d');

const anaCanvas = document.createElement('canvas');
anaCanvas.width  = W_ANA;
anaCanvas.height = H_ANA;
const anaCtx = anaCanvas.getContext('2d', { willReadFrequently: true });

// ══════════════════════════════════════════════════════════════════
// PHASE MANAGEMENT
// ══════════════════════════════════════════════════════════════════
let activePhaseEl = phaseNameEntry;

function showPhase(phaseEl) {
  if (activePhaseEl) activePhaseEl.classList.remove('active');
  phaseEl.classList.add('active');
  activePhaseEl = phaseEl;
}

// ══════════════════════════════════════════════════════════════════
// WEBSOCKET
// ══════════════════════════════════════════════════════════════════
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(proto + '://' + location.host);
  ws.onopen    = () => { state.ws = ws; };
  ws.onclose   = () => { state.ws = null; setTimeout(connectWS, 2000); };
  ws.onerror   = () => ws.close();
  ws.onmessage = ev => {
    try {
      const msg = JSON.parse(ev.data);
      if (msg.type === 'gallery_update' && phaseGallery.classList.contains('gallery-open')) {
        refreshGallery(galleryFilterConcept);
      }
    } catch(e) {}
  };
}
connectWS();

function wsSend(obj) {
  if (state.ws && state.ws.readyState === 1) state.ws.send(JSON.stringify(obj));
}

// ══════════════════════════════════════════════════════════════════
// PHASE 0 — NAME ENTRY
// ══════════════════════════════════════════════════════════════════
function submitName() {
  const v = nameInput.value.trim();
  if (!v) {
    nameInput.classList.remove('shake');
    void nameInput.offsetWidth;
    nameInput.classList.add('shake');
    return;
  }
  state.userName = v;
  showPhase(phaseCal);
}

nameArrow.addEventListener('click', submitName);
nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitName(); });
nameInput.addEventListener('animationend', () => nameInput.classList.remove('shake'));

// ══════════════════════════════════════════════════════════════════
// CALIBRATION FUNCTIONS
// ══════════════════════════════════════════════════════════════════
function stability(samples) {
  if (samples.length < 4) return 0;
  const n  = samples.length;
  const mx = samples.reduce((s, p) => s + p[0], 0) / n;
  const my = samples.reduce((s, p) => s + p[1], 0) / n;
  const vx = samples.reduce((s, p) => s + (p[0] - mx) ** 2, 0) / n;
  const vy = samples.reduce((s, p) => s + (p[1] - my) ** 2, 0) / n;
  return vx + vy;
}

function fitAffine(screenPts, headPts) {
  const n = screenPts.length;
  const A = [], bx = [], by = [];
  for (let i = 0; i < n; i++) {
    A.push([headPts[i][0], headPts[i][1], 1]);
    bx.push(screenPts[i][0]);
    by.push(screenPts[i][1]);
  }
  function lsq(M, b) {
    const Mt  = M[0].map((_, c) => M.map(r => r[c]));
    const MtM = Mt.map(r => Mt[0].map((_, c) =>
      r.reduce((s, v, k) => s + v * M[k][c], 0)));
    const Mtb = Mt.map(r =>
      r.reduce((s, v, k) => s + v * b[k], 0));
    return mv3(inv3(MtM), Mtb);
  }
  return { cx: lsq(A, bx), cy: lsq(A, by) };
}

function inv3(m) {
  const [[a, b, c], [d, e, f], [g, h, k]] = m;
  const det = a * (e * k - f * h) - b * (d * k - f * g) + c * (d * h - e * g);
  const s   = 1 / det;
  return [
    [ (e*k - f*h) * s, -(b*k - c*h) * s,  (b*f - c*e) * s],
    [-(d*k - f*g) * s,  (a*k - c*g) * s, -(a*f - c*d) * s],
    [ (d*h - e*g) * s, -(a*h - b*g) * s,  (a*e - b*d) * s],
  ];
}

function mv3(m, v) {
  return [
    m[0][0]*v[0] + m[0][1]*v[1] + m[0][2]*v[2],
    m[1][0]*v[0] + m[1][1]*v[1] + m[1][2]*v[2],
    m[2][0]*v[0] + m[2][1]*v[1] + m[2][2]*v[2],
  ];
}

function resizeCal() {
  calCanvas.width  = window.innerWidth;
  calCanvas.height = window.innerHeight;
}

function drawIntro(ctx, W, H) {
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);
}

function drawDone(ctx, W, H) {
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);
}

async function awaitDot(ctx, W, H, nx, ny, getLandmarks) {
  return new Promise(resolve => {
    const px = nx * W;
    const py = ny * H;
    let fill = 0;
    const recent   = [];
    const captured = [];

    function frame() {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, H);

      ctx.beginPath();
      ctx.arc(px, py, 22, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(0,0,0,0.08)';
      ctx.lineWidth   = 1.5;
      ctx.stroke();

      if (fill > 0) {
        ctx.beginPath();
        ctx.arc(px, py, 22, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * fill);
        ctx.strokeStyle = '#ff1500';
        ctx.lineWidth   = 2;
        ctx.stroke();
      }

      ctx.beginPath();
      ctx.arc(px, py, 5, 0, Math.PI * 2);
      ctx.fillStyle = '#ff1500';
      ctx.fill();

      const lm = getLandmarks();
      if (lm) {
        const p = lm[1];
        recent.push([p.x, p.y]);
        if (recent.length > 20) recent.shift();
        const v = stability(recent);
        if (v < CAL_VAR_THRESH || samples.length < 8) {
          fill = Math.min(1, fill + CAL_FILL_RATE);
          captured.push([p.x, p.y]);
        } else {
          fill = Math.max(0, fill - CAL_DRAIN_RATE);
        }
      } else {
        fill = Math.max(0, fill - CAL_DRAIN_RATE);
      }

      if (fill >= 1) {
        const avg = captured.slice(-12);
        const ax  = avg.reduce((s, p) => s + p[0], 0) / avg.length;
        const ay  = avg.reduce((s, p) => s + p[1], 0) / avg.length;
        resolve([ax, ay]);
      } else {
        requestAnimationFrame(frame);
      }
    }
    requestAnimationFrame(frame);
  });
}

async function runCalibration(getLandmarks) {
  const W   = calCanvas.width  = window.innerWidth;
  const H   = calCanvas.height = window.innerHeight;
  const ctx = calCanvas.getContext('2d');
  drawIntro(ctx, W, H);

  const screenPts = [];
  const headPts   = [];

  for (const [nx, ny] of CAL_PTS) {
    const hp = await awaitDot(ctx, W, H, nx, ny, getLandmarks);
    screenPts.push([nx, ny]);
    headPts.push(hp);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, H);
    await new Promise(r => setTimeout(r, 180));
  }

  state.calMap = fitAffine(screenPts, headPts);
  drawDone(ctx, W, H);
}

function startHeadTracking(getLandmarks) {
  function loop() {
    const lm = getLandmarks();
    if (lm && state.calMap) {
      const p        = lm[1];
      const { cx, cy } = state.calMap;
      const rx = cx[0] * p.x + cx[1] * p.y + cx[2];
      const ry = cy[0] * p.x + cy[1] * p.y + cy[2];
      state.rawGX  = Math.max(0, Math.min(1, rx));
      state.rawGY  = Math.max(0, Math.min(1, ry));
      state.gazeOn = true;
    } else {
      state.gazeOn = false;
    }
    state.sGX += (state.rawGX - state.sGX) * GAZE_LERP;
    state.sGY += (state.rawGY - state.sGY) * GAZE_LERP;
    requestAnimationFrame(loop);
  }
  loop();
}

function enablePointerFallback() {
  document.addEventListener('mousemove', e => {
    state.rawGX  = e.clientX / window.innerWidth;
    state.rawGY  = e.clientY / window.innerHeight;
    state.gazeOn = true;
  });
  function loop() {
    state.sGX += (state.rawGX - state.sGX) * GAZE_LERP;
    state.sGY += (state.rawGY - state.sGY) * GAZE_LERP;
    requestAnimationFrame(loop);
  }
  loop();
}

// ══════════════════════════════════════════════════════════════════
// BOOT — shows canvas + loading message immediately
// ══════════════════════════════════════════════════════════════════
async function boot() {
  calIntroBlock.style.display = 'none';
  calCanvas.style.display     = 'block';
  resizeCal();
  const ctx = calCanvas.getContext('2d');
  const W   = calCanvas.width;
  const H   = calCanvas.height;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.font      = '300 11px Heebo, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('LOADING…', W / 2, H / 2);

  try {
    const vision = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
    );
    const faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath:
          'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
        delegate: 'GPU',
      },
      outputFaceBlendshapes: false,
      runningMode: 'VIDEO',
      numFaces: 1,
    });

    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    const camEl  = document.createElement('video');
    camEl.srcObject   = stream;
    camEl.autoplay    = true;
    camEl.muted       = true;
    camEl.playsInline = true;
    await new Promise(r => { camEl.onloadeddata = r; });

    let landmarksRef = null;

    function getLandmarks() {
      try {
        const res = faceLandmarker.detectForVideo(camEl, performance.now());
        landmarksRef = (res && res.faceLandmarks && res.faceLandmarks[0])
          ? res.faceLandmarks[0]
          : null;
      } catch(e) {
        landmarksRef = null;
      }
      return landmarksRef;
    }

    (function detectLoop() {
      getLandmarks();
      requestAnimationFrame(detectLoop);
    })();

    await runCalibration(() => landmarksRef);
    startHeadTracking(() => landmarksRef);

  } catch(err) {
    console.warn('MediaPipe/webcam unavailable — pointer fallback:', err);
    enablePointerFallback();
    state.calMap = { cx: [1, 0, 0], cy: [0, 1, 0] };

    const ctxF = calCanvas.getContext('2d');
    const WF   = calCanvas.width;
    const HF   = calCanvas.height;
    for (const [nx, ny] of CAL_PTS) {
      ctxF.fillStyle = '#ffffff';
      ctxF.fillRect(0, 0, WF, HF);
      ctxF.beginPath();
      ctxF.arc(nx * WF, ny * HF, 5, 0, Math.PI * 2);
      ctxF.fillStyle = '#ff1500';
      ctxF.fill();
      await new Promise(r => setTimeout(r, 260));
    }
    ctxF.fillStyle = '#ffffff';
    ctxF.fillRect(0, 0, WF, HF);
  }

  calCanvas.style.display  = 'none';
  calDoneMsg.style.display = 'block';
  await new Promise(r => setTimeout(r, 900));
  calDoneMsg.style.display = 'none';

  menuUserLabel.textContent = state.userName;
  showPhase(phaseMenu);
}

btnCalBegin.addEventListener('click', () => {
  calIntroBlock.style.opacity    = '0';
  calIntroBlock.style.transition = 'opacity 300ms ease';
  setTimeout(boot, 320);
});

// ══════════════════════════════════════════════════════════════════
// ANALYSIS HELPERS
// ══════════════════════════════════════════════════════════════════
let prevEdge = null;

function sobel(video) {
  anaCtx.drawImage(video, 0, 0, W_ANA, H_ANA);
  const id   = anaCtx.getImageData(0, 0, W_ANA, H_ANA);
  const d    = id.data;
  const gray = new Float32Array(W_ANA * H_ANA);
  for (let i = 0; i < gray.length; i++) {
    gray[i] = (d[i*4]*0.299 + d[i*4+1]*0.587 + d[i*4+2]*0.114) / 255;
  }
  const out = new Float32Array(W_ANA * H_ANA);
  for (let y = 1; y < H_ANA - 1; y++) {
    for (let x = 1; x < W_ANA - 1; x++) {
      const i  = y * W_ANA + x;
      const gx = -gray[i-W_ANA-1] + gray[i-W_ANA+1]
                 - 2*gray[i-1]    + 2*gray[i+1]
                 - gray[i+W_ANA-1]+ gray[i+W_ANA+1];
      const gy =  gray[i-W_ANA-1] + 2*gray[i-W_ANA] + gray[i-W_ANA+1]
                 - gray[i+W_ANA-1]- 2*gray[i+W_ANA] - gray[i+W_ANA+1];
      out[i] = Math.sqrt(gx*gx + gy*gy);
    }
  }
  return out;
}

function rStats(arr) {
  let sum = 0, max = 0;
  for (const v of arr) { sum += v; if (v > max) max = v; }
  const mean = sum / arr.length;
  let vari = 0;
  for (const v of arr) vari += (v - mean) ** 2;
  return { mean, max, std: Math.sqrt(vari / arr.length) };
}

function rMotion(curr, prev) {
  if (!prev) return { mean: 0, max: 0, std: 0 };
  const diff = new Float32Array(curr.length);
  for (let i = 0; i < curr.length; i++) diff[i] = Math.abs(curr[i] - prev[i]);
  return rStats(diff);
}

function buildPool(edgeData) {
  const W    = window.innerWidth;
  const H    = window.innerHeight;
  const pool = [];

  if (edgeData) {
    const stats  = rStats(edgeData);
    const thresh = stats.mean + stats.std * DOT_THRESH;
    for (let ay = DOT_STEP; ay < H_ANA - DOT_STEP; ay += DOT_STEP) {
      for (let ax = DOT_STEP; ax < W_ANA - DOT_STEP; ax += DOT_STEP) {
        if (edgeData[ay * W_ANA + ax] > thresh) {
          pool.push(makeDot(ax / W_ANA, ay / H_ANA, W, H));
        }
      }
    }
  }

  while (pool.length < 200) {
    pool.push(makeDot(
      Math.random() * 0.92 + 0.04,
      Math.random() * 0.92 + 0.04,
      W, H
    ));
  }
  return pool;
}

function makeDot(nx, ny, W, H) {
  return {
    nx, ny,
    px: nx * W,
    py: ny * H,
    revealed:    false,
    label:       null,
    labelEl:     null,
    dwellMs:     0,
    visitCount:  0,
    lastVisitTs: 0,
    wasNear:     false,
  };
}

function sizeWrapper() {
  dotCanvas.width   = window.innerWidth;
  dotCanvas.height  = window.innerHeight;
  lineCanvas.width  = window.innerWidth;
  lineCanvas.height = window.innerHeight;
  heatCanvas.width  = window.innerWidth;
  heatCanvas.height = window.innerHeight;
}

function makeLabel(dot) {
  const s = state;
  if (dot.dwellMs > 1200)                                return 'ATTENTION LOCKED';
  if (dot.visitCount >= 3)                               return 'REPEATED GLANCE';
  if (dot.visitCount >= 2 && dot.dwellMs < 150)         return 'IGNORED AGAIN';
  if (s.totalRevealed < 5 && s.sessionMs > 15000)       return 'LOW ENGAGEMENT';
  if (s.avgDwellMs < 200 && s.switchRate > 3)           return 'FOCUS UNSTABLE';
  if (s.totalRevealed > 30 && s.avgDwellMs < 200)       return 'SCAN WITHOUT PROCESSING';
  if (s.gazeSpeed < 0.002 && dot.dwellMs < 300)         return 'VISUAL DRIFT';
  if (dot.visitCount === 0 && s.sessionMs > 20000)      return 'SKIPPED AREA';
  if (s.horizontalSweep)                                 return 'SEARCH PATTERN DETECTED';
  return 'ATTENTION LOCKED';
}

function analyze(video) {
  try {
    const edge = sobel(video);
    rMotion(edge, prevEdge);
    prevEdge = edge;
  } catch(e) {}
}

function applyGaze(pool, dt) {
  const W          = window.innerWidth;
  const H          = window.innerHeight;
  const gx         = state.sGX * W;
  const gy         = state.sGY * H;
  const revealDist = W * REVEAL_FRAC;

  state.gazeHistory.push([state.sGX, state.sGY]);
  if (state.gazeHistory.length > 5) state.gazeHistory.shift();
  if (state.gazeHistory.length >= 2) {
    const a  = state.gazeHistory[0];
    const b  = state.gazeHistory[state.gazeHistory.length - 1];
    const dx = b[0] - a[0];
    const dy = b[1] - a[1];
    state.gazeSpeed = Math.sqrt(dx*dx + dy*dy) / state.gazeHistory.length;
  }

  let nearestIdx  = -1;
  let nearestDist = Infinity;
  for (let i = 0; i < pool.length; i++) {
    const d  = pool[i];
    const dx = d.px - gx;
    const dy = d.py - gy;
    const dd = Math.sqrt(dx*dx + dy*dy);
    if (dd < nearestDist) { nearestDist = dd; nearestIdx = i; }
  }

  if (nearestIdx !== state.lastDotIndex && nearestIdx !== -1) {
    state.lastDotIndex = nearestIdx;
    const now = performance.now();
    state.switchTimestamps.push(now);
    state.switchTimestamps = state.switchTimestamps.filter(t => now - t < 1000);
    state.switchRate = state.switchTimestamps.length;
  }

  for (let i = 0; i < pool.length; i++) {
    const dot  = pool[i];
    const near = (i === nearestIdx && nearestDist < revealDist);

    if (near) {
      dot.dwellMs += dt * 1000;
      if (!dot.wasNear) {
        dot.visitCount++;
        dot.lastVisitTs = state.sessionMs;
        dot.wasNear = true;
      }
      if (!dot.revealed) {
        dot.revealed = true;
        state.totalRevealed++;

        const rev        = pool.filter(d => d.revealed);
        state.avgDwellMs = rev.reduce((s, d) => s + d.dwellMs, 0) / (rev.length || 1);

        const recent4 = pool
          .filter(d => d.revealed && d.lastVisitTs > 0)
          .sort((a, b) => a.lastVisitTs - b.lastVisitTs)
          .slice(-4);
        if (recent4.length === 4) {
          const avgY  = recent4.reduce((s, d) => s + d.ny, 0) / 4;
          const sameY = recent4.every(d => Math.abs(d.ny - avgY) < 0.03);
          const incX  = recent4[0].nx < recent4[1].nx &&
                        recent4[1].nx < recent4[2].nx &&
                        recent4[2].nx < recent4[3].nx;
          state.horizontalSweep = sameY && incX;
        }

        const labelText = makeLabel(dot);
        dot.label = labelText;
        state.labelsRevealed.push(labelText);
        state.analysisLog.push({ label: labelText, count: state.totalRevealed, ts: state.sessionMs });

        const labelEl       = document.createElement('div');
        labelEl.className   = 'dot-label';
        labelEl.textContent = labelText;
        labelEl.style.left  = dot.px + 'px';
        labelEl.style.top   = dot.py + 'px';
        annLayer.appendChild(labelEl);
        dot.labelEl = labelEl;
      }
    } else {
      dot.wasNear = false;
    }
  }

  const rev = pool.filter(d => d.revealed);
  if (rev.length) state.avgDwellMs = rev.reduce((s, d) => s + d.dwellMs, 0) / rev.length;

  return { nearestIdx, nearestDist };
}

// ══════════════════════════════════════════════════════════════════
// CONCEPT SESSION
// ══════════════════════════════════════════════════════════════════
let conceptRAF      = null;
let sessionInterval = null;
let frameInterval   = null;
let anaInterval     = null;

let c1State       = {};
let c2Lines       = [];
let c2PrevIdx     = -1;
let c2PrevTime    = 0;
let c3Path        = [];
let c4Trail       = [];
let c5List        = [];
let c6Arcs        = [];
let c6Count       = 0;
let c6VisitedOnce = {};
let c7Heat        = null;
const HEAT_W      = 60;
const HEAT_H      = 34;

function generateSessionId() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

function startConcept(conceptNum) {
  state.currentConcept   = conceptNum;
  state.sessionId        = generateSessionId();
  state.sessionStart     = performance.now();
  state.sessionMs        = 0;
  state.labelsRevealed   = [];
  state.analysisLog      = [];
  state.frameBuffer      = [];
  state.prevPx           = null;
  state.gazeHistory      = [];
  state.totalRevealed    = 0;
  state.avgDwellMs       = 0;
  state.switchRate       = 0;
  state.lastDotIndex     = -1;
  state.switchTimestamps = [];
  state.horizontalSweep  = false;
  state.gazeSpeed        = 0;
  prevEdge               = null;

  c1State       = {};
  c2Lines       = [];
  c2PrevIdx     = -1;
  c2PrevTime    = performance.now();
  c3Path        = [];
  c4Trail       = [];
  c5List        = [];
  c6Arcs        = [];
  c6Count       = 0;
  c6VisitedOnce = {};
  c7Heat        = new Float32Array(HEAT_W * HEAT_H);

  sizeWrapper();
  heatCtx.clearRect(0, 0, heatCanvas.width, heatCanvas.height);
  lineCtx.clearRect(0, 0, lineCanvas.width, lineCanvas.height);
  dotCtx.clearRect(0,  0, dotCanvas.width,  dotCanvas.height);
  annLayer.innerHTML = '';

  let edgeData;
  try { edgeData = sobel(conceptVideo); } catch(e) { edgeData = null; }
  state.pool = buildPool(edgeData);

  conceptNameLabel.textContent = String(conceptNum).padStart(2, '0') + '  ' + CONCEPT_NAMES[conceptNum];
  conceptSubLabel.textContent  = conceptNum === 3 ? 'PATH · 0 NODES'
                                : conceptNum === 6 ? 'REVISITS · 0'
                                : '';
  progressFill.style.width     = '0%';
  conceptCountdown.textContent = '01:30';

  showPhase(phaseConcept);
  document.body.style.cursor = 'none';
  gazeDot.style.display      = 'block';

  let elapsed = 0;
  sessionInterval = setInterval(() => {
    elapsed++;
    progressFill.style.width = ((elapsed / 90) * 100) + '%';
    const rem = Math.max(0, 90 - elapsed);
    conceptCountdown.textContent =
      String(Math.floor(rem / 60)).padStart(2, '0') + ':' + String(rem % 60).padStart(2, '0');
    if (elapsed >= 90) endSessionToGallery();
  }, 1000);

  frameInterval = setInterval(captureFrame, 3000);
  anaInterval   = setInterval(() => analyze(conceptVideo), ANA_INTERVAL);

  let lastT = performance.now();
  function loop(now) {
    const dt = Math.min((now - lastT) / 1000, 0.1);
    lastT = now;

    state.sessionMs = now - state.sessionStart;

    const W  = dotCanvas.width;
    const H  = dotCanvas.height;
    const gx = state.sGX * W;
    const gy = state.sGY * H;

    gazeDot.style.left = gx + 'px';
    gazeDot.style.top  = gy + 'px';

    const { nearestIdx, nearestDist } = applyGaze(state.pool, dt);

    dotCtx.clearRect(0, 0, W, H);

    switch (conceptNum) {
      case 1: renderFixation(dt, W, H, gx, gy, nearestIdx, nearestDist, now); break;
      case 2: renderSaccade(dt, W, H, gx, gy, nearestIdx, nearestDist);       break;
      case 3: renderScanPath(dt, W, H, gx, gy);                               break;
      case 4: renderGazePoint(dt, W, H, gx, gy, now);                         break;
      case 5: renderFirstFixation(dt, W, H, gx, gy, nearestIdx, nearestDist); break;
      case 6: renderRevisit(dt, W, H, gx, gy, nearestIdx, nearestDist, now);  break;
      case 7: renderHeatmap(dt, W, H, gx, gy);                                break;
    }

    conceptRAF = requestAnimationFrame(loop);
  }
  conceptRAF = requestAnimationFrame(t => { lastT = t; loop(t); });
}

// ══════════════════════════════════════════════════════════════════
// SESSION CLEANUP — split destinations
// ══════════════════════════════════════════════════════════════════
function cleanupSession() {
  clearInterval(sessionInterval);
  clearInterval(frameInterval);
  clearInterval(anaInterval);
  cancelAnimationFrame(conceptRAF);
  sessionInterval = null;
  frameInterval   = null;
  anaInterval     = null;
  conceptRAF      = null;

  document.body.style.cursor = '';
  gazeDot.style.display      = 'none';
  annLayer.innerHTML         = '';
  dotCtx.clearRect(0,  0, dotCanvas.width,  dotCanvas.height);
  lineCtx.clearRect(0, 0, lineCanvas.width, lineCanvas.height);
  heatCtx.clearRect(0, 0, heatCanvas.width, heatCanvas.height);

  wsSend({
    type:      'end',
    session:   state.sessionId,
    user_name: state.userName,
    concept:   state.currentConcept,
    duration:  Math.floor(state.sessionMs / 1000),
    labels:    state.labelsRevealed,
    analysis:  state.analysisLog,
  });
}

function endSessionToMenu() {
  cleanupSession();
  state.currentConcept = null;
  showPhase(phaseMenu);
  menuUserLabel.textContent = state.userName;
}

function endSessionToGallery() {
  const concept = state.currentConcept;
  cleanupSession();
  state.currentConcept = null;
  openGallery(concept);
}

conceptBack.addEventListener('click',   endSessionToMenu);
conceptEndBtn.addEventListener('click', endSessionToGallery);

// ══════════════════════════════════════════════════════════════════
// FRAME CAPTURE
// ══════════════════════════════════════════════════════════════════
function captureFrame() {
  offCtx.clearRect(0, 0, 1280, 720);
  try { offCtx.drawImage(conceptVideo, 0, 0, 1280, 720); } catch(e) {}
  try { offCtx.drawImage(heatCanvas,   0, 0, 1280, 720); } catch(e) {}
  try { offCtx.drawImage(lineCanvas,   0, 0, 1280, 720); } catch(e) {}
  try { offCtx.drawImage(dotCanvas,    0, 0, 1280, 720); } catch(e) {}
  const dataUrl = offCanvas.toDataURL('image/png', 0.72);
  state.frameBuffer.push(dataUrl);
  wsSend({ type: 'frame', session: state.sessionId, data: dataUrl });
}

// ══════════════════════════════════════════════════════════════════
// CONCEPT 1 — FIXATION
// ══════════════════════════════════════════════════════════════════
function renderFixation(dt, W, H, gx, gy, nearestIdx, nearestDist, now) {
  const revealDist = W * REVEAL_FRAC;
  for (let i = 0; i < state.pool.length; i++) {
    const dot  = state.pool[i];
    if (!dot.revealed) continue;
    const near = (i === nearestIdx && nearestDist < revealDist && dot.dwellMs > 800);

    if (!c1State[i]) c1State[i] = { r: 2, growing: false, pulseStart: 0 };
    const s = c1State[i];

    if (near) {
      if (!s.growing) { s.growing = true; s.pulseStart = now; }
      s.r = Math.min(10, s.r + (10 - s.r) * 0.12);
      const t     = ((now - s.pulseStart) % 1200) / 1200;
      const scale = 1 + 0.15 * Math.sin(t * Math.PI * 2);
      dotCtx.save();
      dotCtx.translate(dot.px, dot.py);
      dotCtx.scale(scale, scale);
      dotCtx.beginPath();
      dotCtx.arc(0, 0, s.r, 0, Math.PI * 2);
      dotCtx.fillStyle = '#ffffff';
      dotCtx.fill();
      dotCtx.restore();
    } else {
      s.growing = false;
      s.r = Math.max(2, s.r + (2 - s.r) * 0.1);
      dotCtx.beginPath();
      dotCtx.arc(dot.px, dot.py, s.r, 0, Math.PI * 2);
      dotCtx.fillStyle = s.r > 2.5 ? '#ffffff' : 'rgba(255,21,0,0.55)';
      dotCtx.fill();
    }
  }
}

// ══════════════════════════════════════════════════════════════════
// CONCEPT 2 — SACCADE
// ══════════════════════════════════════════════════════════════════
function renderSaccade(dt, W, H, gx, gy, nearestIdx, nearestDist) {
  const revealDist = W * REVEAL_FRAC;

  for (const dot of state.pool) {
    if (!dot.revealed) continue;
    dotCtx.beginPath();
    dotCtx.arc(dot.px, dot.py, 2, 0, Math.PI * 2);
    dotCtx.fillStyle = 'rgba(255,21,0,0.45)';
    dotCtx.fill();
  }

  if (
    nearestIdx >= 0 &&
    nearestDist < revealDist &&
    nearestIdx !== c2PrevIdx &&
    c2PrevIdx >= 0
  ) {
    const nowMs = performance.now();
    const ms    = nowMs - c2PrevTime;
    const prev  = state.pool[c2PrevIdx];
    const curr  = state.pool[nearestIdx];
    const dx    = (curr.px - prev.px) / W;
    const dy    = (curr.py - prev.py) / H;
    const dist  = Math.sqrt(dx*dx + dy*dy);
    if (dist > 0.08 && ms < 300) {
      c2Lines.push({ x1: prev.px, y1: prev.py, x2: curr.px, y2: curr.py, alpha: 0.6 });
    }
    c2PrevTime = nowMs;
  }
  if (nearestIdx >= 0 && nearestDist < revealDist) c2PrevIdx = nearestIdx;

  lineCtx.clearRect(0, 0, lineCanvas.width, lineCanvas.height);
  c2Lines = c2Lines.filter(ln => {
    ln.alpha -= dt * 0.75;
    if (ln.alpha <= 0) return false;
    lineCtx.beginPath();
    lineCtx.moveTo(ln.x1, ln.y1);
    lineCtx.lineTo(ln.x2, ln.y2);
    lineCtx.strokeStyle = `rgba(255,21,0,${ln.alpha.toFixed(3)})`;
    lineCtx.lineWidth   = 1;
    lineCtx.stroke();
    return true;
  });
}

// ══════════════════════════════════════════════════════════════════
// CONCEPT 3 — SCAN PATH
// ══════════════════════════════════════════════════════════════════
function renderScanPath(dt, W, H, gx, gy) {
  for (const dot of state.pool) {
    if (!dot.revealed) continue;
    dotCtx.beginPath();
    dotCtx.arc(dot.px, dot.py, 2, 0, Math.PI * 2);
    dotCtx.fillStyle = 'rgba(255,21,0,0.4)';
    dotCtx.fill();
  }

  if (state.gazeOn) {
    const last = c3Path[c3Path.length - 1];
    if (!last || Math.hypot(last.x - gx, last.y - gy) > 3) {
      c3Path.push({ x: gx, y: gy });
      if (c3Path.length > 40) c3Path.shift();
    }
  }

  lineCtx.clearRect(0, 0, lineCanvas.width, lineCanvas.height);
  if (c3Path.length >= 2) {
    for (let i = 1; i < c3Path.length; i++) {
      const frac  = i / (c3Path.length - 1);
      const alpha = 0.06 + 0.64 * frac;
      lineCtx.beginPath();
      lineCtx.moveTo(c3Path[i-1].x, c3Path[i-1].y);
      lineCtx.lineTo(c3Path[i].x,   c3Path[i].y);
      lineCtx.strokeStyle = `rgba(255,21,0,${alpha.toFixed(3)})`;
      lineCtx.lineWidth   = 1;
      lineCtx.stroke();
    }
  }

  conceptSubLabel.textContent = `PATH · ${c3Path.length} NODES`;
}

// ══════════════════════════════════════════════════════════════════
// CONCEPT 4 — GAZE POINT
// ══════════════════════════════════════════════════════════════════
function renderGazePoint(dt, W, H, gx, gy, now) {
  lineCtx.clearRect(0, 0, lineCanvas.width, lineCanvas.height);

  c4Trail.push({ x: gx, y: gy });
  if (c4Trail.length > 12) c4Trail.shift();

  for (let i = 0; i < c4Trail.length; i++) {
    const frac  = i / (c4Trail.length - 1);
    const r     = 1 + 7 * frac;
    const alpha = 0.05 + 0.45 * frac;
    dotCtx.beginPath();
    dotCtx.arc(c4Trail[i].x, c4Trail[i].y, r, 0, Math.PI * 2);
    dotCtx.fillStyle = `rgba(255,255,255,${alpha.toFixed(3)})`;
    dotCtx.fill();
  }

  const ringDefs = [{ offset: 0 }, { offset: 500 }, { offset: 1000 }];
  for (const rd of ringDefs) {
    const t     = ((now - rd.offset) % 1500) / 1500;
    const r     = 8 + (40 - 8) * t;
    const alpha = 0.4 * (1 - t);
    if (alpha <= 0) continue;
    dotCtx.beginPath();
    dotCtx.arc(gx, gy, r, 0, Math.PI * 2);
    dotCtx.strokeStyle = `rgba(255,255,255,${alpha.toFixed(3)})`;
    dotCtx.lineWidth   = 1;
    dotCtx.stroke();
  }

  dotCtx.beginPath();
  dotCtx.arc(gx, gy, 8, 0, Math.PI * 2);
  dotCtx.fillStyle = '#ffffff';
  dotCtx.fill();
}

// ══════════════════════════════════════════════════════════════════
// CONCEPT 5 — FIRST FIXATION
// ══════════════════════════════════════════════════════════════════
function renderFirstFixation(dt, W, H, gx, gy, nearestIdx, nearestDist) {
  const revealDist = W * REVEAL_FRAC;
  lineCtx.clearRect(0, 0, lineCanvas.width, lineCanvas.height);

  if (nearestIdx >= 0 && nearestDist < revealDist) {
    const dot = state.pool[nearestIdx];
    if (!c5List.find(f => f.idx === nearestIdx) && dot.dwellMs > 600) {
      const order = c5List.length;
      const ts    = Math.floor(state.sessionMs);
      c5List.push({ idx: nearestIdx, order, ts });

      const labelEl       = document.createElement('div');
      labelEl.className   = 'dot-label';
      labelEl.textContent = order === 0
        ? `FIRST FIXATION / T+${ts}ms`
        : `FIXATION_${order + 1} / T+${ts}ms`;
      labelEl.style.left = dot.px + 'px';
      labelEl.style.top  = dot.py + 'px';
      annLayer.appendChild(labelEl);
    }
  }

  for (const fix of c5List) {
    const dot = state.pool[fix.idx];
    if (fix.order === 0) {
      dotCtx.beginPath();
      dotCtx.arc(dot.px, dot.py, 8, 0, Math.PI * 2);
      dotCtx.fillStyle = '#ffffff';
      dotCtx.fill();
    } else {
      dotCtx.beginPath();
      dotCtx.arc(dot.px, dot.py, 4, 0, Math.PI * 2);
      dotCtx.fillStyle = '#ff1500';
      dotCtx.fill();
    }
  }
}

// ══════════════════════════════════════════════════════════════════
// CONCEPT 6 — REVISIT
// ══════════════════════════════════════════════════════════════════
function renderRevisit(dt, W, H, gx, gy, nearestIdx, nearestDist, now) {
  for (let i = 0; i < state.pool.length; i++) {
    const dot = state.pool[i];
    if (!dot.revealed) continue;

    if (dot.visitCount >= 2 && !c6VisitedOnce[i]) {
      c6VisitedOnce[i] = true;
      c6Count++;
      conceptSubLabel.textContent = `REVISITS · ${c6Count}`;
      const prevDots = state.pool.filter((d, j) => d.revealed && j !== i);
      const fromDot  = prevDots[prevDots.length - 1];
      c6Arcs.push({
        x1: fromDot ? fromDot.px : dot.px - 120,
        y1: fromDot ? fromDot.py : dot.py,
        x2: dot.px,
        y2: dot.py,
        progress: 0,
        born: now,
      });
    }

    if (dot.visitCount >= 3) {
      const scale = 1 + 0.15 * Math.sin(now * 0.001 * Math.PI * 2 * 0.8);
      dotCtx.save();
      dotCtx.translate(dot.px, dot.py);
      dotCtx.scale(scale, scale);
      dotCtx.beginPath();
      dotCtx.arc(0, 0, 4, 0, Math.PI * 2);
      dotCtx.fillStyle = '#ff1500';
      dotCtx.fill();
      dotCtx.restore();
    } else {
      dotCtx.beginPath();
      dotCtx.arc(dot.px, dot.py, 2, 0, Math.PI * 2);
      dotCtx.fillStyle = 'rgba(255,21,0,0.45)';
      dotCtx.fill();
    }
  }

  lineCtx.clearRect(0, 0, lineCanvas.width, lineCanvas.height);
  c6Arcs = c6Arcs.filter(arc => {
    arc.progress = Math.min(1, arc.progress + dt / 0.4);
    const cpX    = (arc.x1 + arc.x2) / 2;
    const cpY    = Math.min(arc.y1, arc.y2) - 60;
    const steps  = Math.ceil(arc.progress * 40);
    lineCtx.beginPath();
    for (let s = 0; s <= steps; s++) {
      const t  = s / 40;
      const bx = (1-t)*(1-t)*arc.x1 + 2*(1-t)*t*cpX + t*t*arc.x2;
      const by = (1-t)*(1-t)*arc.y1 + 2*(1-t)*t*cpY + t*t*arc.y2;
      if (s === 0) lineCtx.moveTo(bx, by);
      else         lineCtx.lineTo(bx, by);
    }
    lineCtx.strokeStyle = 'rgba(255,21,0,0.5)';
    lineCtx.lineWidth   = 1;
    lineCtx.stroke();
    return now - arc.born < 4000;
  });
}

// ══════════════════════════════════════════════════════════════════
// CONCEPT 7 — HEATMAP
// ══════════════════════════════════════════════════════════════════
function renderHeatmap(dt, W, H, gx, gy) {
  for (let i = 0; i < c7Heat.length; i++) c7Heat[i] *= 0.992;

  const hgx = Math.round(state.sGX * HEAT_W);
  const hgy = Math.round(state.sGY * HEAT_H);
  const R   = 4;
  for (let dy = -R; dy <= R; dy++) {
    for (let dx = -R; dx <= R; dx++) {
      const hx = hgx + dx;
      const hy = hgy + dy;
      if (hx < 0 || hx >= HEAT_W || hy < 0 || hy >= HEAT_H) continue;
      const w  = Math.exp(-(dx*dx + dy*dy) / (R * R * 0.5));
      const ii = hy * HEAT_W + hx;
      c7Heat[ii] = Math.min(1, c7Heat[ii] + w * 0.06);
    }
  }

  const cw = W / HEAT_W;
  const ch = H / HEAT_H;
  heatCtx.clearRect(0, 0, W, H);
  for (let hy = 0; hy < HEAT_H; hy++) {
    for (let hx = 0; hx < HEAT_W; hx++) {
      const v = c7Heat[hy * HEAT_W + hx];
      if (v < 0.01) continue;
      let color;
      if      (v < 0.15) color = `rgba(255,21,0,${(0.06 * v / 0.15).toFixed(3)})`;
      else if (v < 0.5)  color = `rgba(255,60,0,${(0.06 + 0.16 * (v - 0.15) / 0.35).toFixed(3)})`;
      else               color = `rgba(255,21,0,${(0.22 + 0.28 * (v - 0.5)  / 0.5).toFixed(3)})`;
      heatCtx.fillStyle = color;
      heatCtx.fillRect(hx * cw, hy * ch, cw + 1, ch + 1);
    }
  }

  for (const dot of state.pool) {
    if (!dot.revealed) continue;
    dotCtx.beginPath();
    dotCtx.arc(dot.px, dot.py, 2, 0, Math.PI * 2);
    dotCtx.fillStyle = 'rgba(255,21,0,0.4)';
    dotCtx.fill();
  }
}

// ══════════════════════════════════════════════════════════════════
// GALLERY
// ══════════════════════════════════════════════════════════════════
let galleryFilterConcept = null;

async function openGallery(conceptNum) {
  galleryFilterConcept = conceptNum;

  galleryTitle.textContent = conceptNum
    ? `CONCEPT ${String(conceptNum).padStart(2, '0')} — ${CONCEPT_NAMES[conceptNum]}`
    : 'ALL SESSIONS';

  await refreshGallery(conceptNum);

  if (activePhaseEl === phaseConcept) {
    phaseConcept.classList.remove('active');
    activePhaseEl = null;
  }

  phaseGallery.classList.add('gallery-open');
}

async function refreshGallery(conceptNum) {
  const url = conceptNum ? `/api/sessions?concept=${conceptNum}` : '/api/sessions';
  let sessions = [];
  try {
    const res = await fetch(url);
    sessions  = await res.json();
  } catch(e) {}

  galleryCount.textContent =
    `${sessions.length} SESSION${sessions.length !== 1 ? 'S' : ''}`;
  galleryGrid.innerHTML = '';

  if (!sessions.length) {
    const empty       = document.createElement('div');
    empty.id          = 'galleryEmpty';
    empty.textContent = 'NO SESSIONS RECORDED YET';
    galleryGrid.appendChild(empty);
    return;
  }

  for (const s of sessions) {
    const card = document.createElement('div');
    card.className = 'galleryCard';

    const vid         = document.createElement('video');
    vid.muted         = true;
    vid.loop          = true;
    vid.playsInline   = true;
    if (s.video_path) vid.src = s.video_path;
    vid.addEventListener('mouseenter', () => vid.play().catch(() => {}));
    vid.addEventListener('mouseleave', () => { vid.pause(); vid.currentTime = 0; });

    const info = document.createElement('div');
    info.className = 'galleryCardInfo';

    const nameEl       = document.createElement('div');
    nameEl.className   = 'galleryCardName';
    nameEl.textContent = s.user_name || '—';

    const durEl     = document.createElement('div');
    durEl.className = 'galleryCardDuration';
    const d = s.duration_seconds || 0;
    durEl.textContent =
      String(Math.floor(d / 60)).padStart(2, '0') + ':' + String(d % 60).padStart(2, '0');

    const lblArr = Array.isArray(s.labels_revealed) ? s.labels_revealed : [];
    const lc     = {};
    for (const l of lblArr) lc[l] = (lc[l] || 0) + 1;
    const lblEl       = document.createElement('div');
    lblEl.className   = 'galleryCardLabels';
    lblEl.textContent = Object.entries(lc).map(([k, v]) => `${k} ×${v}`).join('\n');

    info.appendChild(nameEl);
    info.appendChild(durEl);
    info.appendChild(lblEl);
    card.appendChild(vid);
    card.appendChild(info);
    galleryGrid.appendChild(card);
  }
}

galleryBackBtn.addEventListener('click', () => {
  phaseGallery.classList.remove('gallery-open');
  setTimeout(() => {
    showPhase(phaseMenu);
    menuUserLabel.textContent = state.userName;
  }, 400);
});

galleryAllBtn.addEventListener('click', () => openGallery(null));

// RESIZE
// ══════════════════════════════════════════════════════════════════
window.addEventListener('resize', () => {
  if (state.currentConcept) {
    sizeWrapper();
    const W = window.innerWidth;
    const H = window.innerHeight;
    for (const dot of state.pool) {
      dot.px = dot.nx * W;
      dot.py = dot.ny * H;
      if (dot.labelEl) {
        dot.labelEl.style.left = dot.px + 'px';
        dot.labelEl.style.top  = dot.py + 'px';
      }
    }
  }
});
